spring.application.name=pismo-challenge-api

# Configuração do banco de dados
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pismo_challenge}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:pismo}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:pismo}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Jackson — serialização em snake_case para seguir o contrato da API
spring.jackson.property-naming-strategy=SNAKE_CASE

# Docker Compose — desabilitado; orquestração é feita manualmente
spring.docker.compose.enabled=false
