spring.application.name=pismo-challenge-api

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Database configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pismo_challenge}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:pismo}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:pismo}

# Actuator
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=health,metrics,thread-dump,info,caches

# Jackson — snake_case serialization to follow API contract
spring.jackson.property-naming-strategy=SNAKE_CASE

# Docker Compose — disabled; orchestration is done manually
spring.docker.compose.enabled=false

# Resilience4j — Retry (exponential backoff)
resilience.retry.max-attempts=3
resilience.retry.initial-interval-ms=200
resilience.retry.multiplier=2.0

# Resilience4j — Circuit Breaker
resilience.circuit-breaker.failure-rate-threshold=50
resilience.circuit-breaker.wait-duration-open-s=30
resilience.circuit-breaker.sliding-window-size=10
resilience.circuit-breaker.minimum-calls=5
resilience.circuit-breaker.permitted-half-open-calls=3

# Resilience4j — Rate Limiter
resilience.rate-limiter.limit-per-period=100
resilience.rate-limiter.period-ms=1000
resilience.rate-limiter.timeout-ms=500
