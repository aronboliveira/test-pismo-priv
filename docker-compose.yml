services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: pismo_challenge
      POSTGRES_USER: pismo
      POSTGRES_PASSWORD: pismo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pismo -d pismo_challenge"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/pismo_challenge
      SPRING_DATASOURCE_USERNAME: pismo
      SPRING_DATASOURCE_PASSWORD: pismo
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
    ports:
      - "${API_PORT:-8080}:8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
